# example-home.yaml — seed data for a fictional 4BR/3BA Texas home.
# Fork this file as `garrett-home.yaml` (gitignored) with your real systems,
# vendors, and belongings. The schema in schema/migrations/0001_initial.sql
# is what this maps to — every section corresponds to a table.

place:
  id: 00000000-0000-0000-0000-000000000001
  kind: home
  name: "Example Home"
  address: "123 Example Lane, Austin TX"
  world_model_id: null  # populate after first iPhone LiDAR scan in whitelabel-3d
  rooms:
    - master_bedroom
    - master_bathroom
    - kitchen
    - living_room
    - dining_room
    - office
    - garage
    - laundry_room
    - kids_bedroom_1
    - kids_bedroom_2
    - guest_bathroom

