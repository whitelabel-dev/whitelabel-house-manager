    install_date: 2023-05-12
    warranty_until: 2033-05-12
    room: utility_closet
    metadata:
      ecobee_thermostat_id: "TODO"
      filter_size: "20x25x4"
      filter_replace_cadence_months: 3

  - kind: hvac
    name: "Upstairs HVAC"
    manufacturer: "Carrier"
    model_number: "Infinity 24-A-Series"
    install_date: 2023-05-12
    room: attic

  - kind: sprinkler
